<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vulcanum</title>
  <desc id="desc">A branded Vulcanum banner with a geometric fire mark and the tagline agentic work orchestration.</desc>
  <defs>
