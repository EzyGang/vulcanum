name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:

env:
  SQLX_OFFLINE: true
  CARGO_INCREMENTAL: 0

jobs:
  lint:
    name: Validate (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes clang libssl-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint-${{ matrix.runner }}
      - run: pnpm install --frozen-lockfile
      - name: Run format, lint, and type-check
        run: pnpm run validate

  test:
    name: Test (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            postgres_image: postgres:17-alpine
          - runner: macos-latest
            postgres_image: ""
          - runner: macos-15-intel
            postgres_image: ""
    runs-on: ${{ matrix.runner }}
    services:
      postgres:
        image: ${{ matrix.postgres_image }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vulcanum_db
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes clang libssl-dev pkg-config
      - name: Start macOS PostgreSQL
        if: runner.os == 'macOS'
        run: |
          brew install postgresql
          postgres_bin="$(brew --prefix postgresql)/bin"
          echo "$postgres_bin" >> "$GITHUB_PATH"
          "$postgres_bin/initdb" \
            --pgdata "$RUNNER_TEMP/postgres" \
            --username postgres \
            --auth trust \
            --encoding UTF8 \
            --no-locale
          "$postgres_bin/pg_ctl" \
            -D "$RUNNER_TEMP/postgres" \
            -l "$RUNNER_TEMP/postgres.log" \
            -o "-p 5432 -c max_connections=200" \
            -w start
          "$postgres_bin/createdb" \
            --host localhost \
            --port 5432 \
            --username postgres \
            vulcanum_db
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.runner }}
      - name: Install SQLx CLI
        run: cargo install sqlx-cli --locked
      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/vulcanum_db
        run: sqlx migrate run --source server/migrations
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/vulcanum_db
          RUST_TEST_THREADS: "8"
        run: pnpm run test

  ci-pass:
    name: CI succeeded
    if: always()
    needs:
      - lint
      - test
    runs-on: ubuntu-24.04
    steps:
      - name: Check whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
