name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
  pull_request:

env:
  SQLX_OFFLINE: true
  CARGO_INCREMENTAL: 0

jobs:
  lint:
    name: Validate (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes clang libssl-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint-${{ matrix.runner }}
      - run: pnpm install --frozen-lockfile
      - name: Run format, lint, and type-check
        run: pnpm run validate

  test:
    name: Test (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vulcanum_db
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang libssl-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.runner }}
      - name: Install SQLx CLI
        run: cargo install sqlx-cli --locked
      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/vulcanum_db
        run: sqlx migrate run --source server/migrations
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/vulcanum_db
        run: pnpm run test

  ci-pass:
    name: CI succeeded
    if: always()
    needs:
      - lint
      - test
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
