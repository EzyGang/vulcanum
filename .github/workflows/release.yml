name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - full
          - alpha

permissions:
  contents: write

jobs:
  metadata:
    name: Resolve release metadata
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    outputs:
      name: ${{ steps.tag.outputs.name }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
      previous_tag: ${{ steps.tag.outputs.previous_tag }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Parse version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Compute tag
        id: tag
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "$RELEASE_TYPE" = "alpha" ]; then
            latest_alpha=$(git tag --list "v${VERSION}-alpha.*" --sort=-v:refname | head -1 || true)
            if [ -z "$latest_alpha" ]; then
              alpha_num=1
              previous_tag=$(git tag --list 'v*' --sort=-v:refname | grep -v '\-alpha' | head -1 || true)
            else
              alpha_num=$(echo "$latest_alpha" | sed 's/.*-alpha\.//')
              alpha_num=$((alpha_num + 1))
              previous_tag="$latest_alpha"
            fi
            tag="v${VERSION}-alpha.${alpha_num}"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            previous_tag=$(git tag --list 'v*' --sort=-v:refname | grep -v '\-alpha' | head -1 || true)
            tag="v${VERSION}"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$tag" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${previous_tag:-}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes clang libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build --locked --release --target "${{ matrix.target }}" --bin vulcanum --bin vulcanum-server

      - name: Package binaries
        env:
          TARGET: ${{ matrix.target }}
        run: |
          archive="vulcanum-${TARGET}.tar.gz"
          tar -czf "$archive" -C "target/${TARGET}/release" vulcanum vulcanum-server
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: vulcanum-${{ matrix.target }}
          path: |
            vulcanum-${{ matrix.target }}.tar.gz
            vulcanum-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  approval:
    name: Approve release
    needs:
      - metadata
      - build
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    environment: release
    steps:
      - name: Confirm approval
        run: echo "Release ${{ needs.metadata.outputs.tag }} approved"

  release:
    name: Publish release
    needs:
      - metadata
      - approval
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          target_commitish: main
          name: ${{ needs.metadata.outputs.name }}
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          generate_release_notes: true
          previous_tag: ${{ needs.metadata.outputs.previous_tag || null }}
          files: dist/*
          fail_on_unmatched_files: true
