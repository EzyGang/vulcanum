name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        type: choice
        options:
          - full
          - alpha

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Parse version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Compute tag
        id: tag
        run: |
          version="${{ steps.version.outputs.version }}"
          if [ "${{ inputs.release_type }}" = "alpha" ]; then
            echo "tag=v${version}-alpha" >> "$GITHUB_OUTPUT"
            echo "name=v${version}-alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${version}" >> "$GITHUB_OUTPUT"
            echo "name=v${version}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Build Dependencies
        run: sudo apt update && sudo apt install pkg-config libssl-dev clang -y

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build CLI (release)
        run: cargo build --release --bin vulcanum

      - name: Build Worker Server (release)
        run: cargo build --release --bin vulcanum-server

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: main
          name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            target/release/vulcanum
            target/release/vulcanum-server