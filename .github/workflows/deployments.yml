name: Deployment

concurrency:
  group: deployment-${{ github.event_name == 'push' && 'dev' || inputs.environment }}
  cancel-in-progress: true

on:
  push:
    branches:
      - development
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        default: "dev"
        type: environment

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy
    if: github.event_name == 'push' || inputs.environment == 'dev'
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
    environment:
      name: dev
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: EzyGang/telegram-ci-status@v1
        with:
          bot_token: ${{ secrets.TG_TOKEN }}
          chat_id: ${{ secrets.TG_CHAT }}
          is_deployment: true
          pin_on_success: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build & Push Backend Image
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE_NAME: ${{ vars.BACKEND_IMAGE_NAME }}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD $DOCKER_REGISTRY

          if !(docker manifest inspect $DOCKER_REGISTRY/$IMAGE_NAME:${GITHUB_SHA::7})
          then
            docker buildx build --push --file server/docker/Dockerfile \
              --build-arg BUILD_PROFILE=dev-docker \
              --tag $DOCKER_REGISTRY/$IMAGE_NAME:${GITHUB_SHA::7} \
              --cache-to "type=registry,ref=$DOCKER_REGISTRY/$IMAGE_NAME:deps,compression=zstd" \
              --cache-from "type=registry,ref=$DOCKER_REGISTRY/$IMAGE_NAME:deps" \
              --target runtime \
              .
          fi

      - name: Build & Push Frontend Image
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE_NAME: ${{ vars.FRONTEND_IMAGE_NAME }}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD $DOCKER_REGISTRY

          if !(docker manifest inspect $DOCKER_REGISTRY/$IMAGE_NAME:${GITHUB_SHA::7})
          then
            docker buildx build --push --file frontend/docker/Dockerfile \
              --tag $DOCKER_REGISTRY/$IMAGE_NAME:${GITHUB_SHA::7} \
              --cache-to "type=registry,ref=$DOCKER_REGISTRY/$IMAGE_NAME:deps,compression=zstd" \
              --cache-from "type=registry,ref=$DOCKER_REGISTRY/$IMAGE_NAME:deps" \
              .
          fi
