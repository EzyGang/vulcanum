name: E2E Integration Tests

concurrency:
  group: e2e-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:

env:
  SQLX_OFFLINE: true

jobs:
  e2e:
    name: E2E Worker-Server Protocol (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vulcanum_e2e
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang libssl-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e
          key: ${{ matrix.runner }}
      - name: Install SQLx CLI
        run: cargo install sqlx-cli --locked
      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/vulcanum_e2e
        run: sqlx migrate run --source server/migrations
      - run: pnpm install --frozen-lockfile
      - name: Run e2e tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/vulcanum_e2e
          REDIS_URL: redis://localhost:6379
        run: pnpm --filter=@repo/server run test -- e2e
